<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Universo Infinito ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020208;
            font-family: 'Arial', sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Letreros de los Ositos estilo Burbuja */
        .oso-label {
            position: absolute;
            color: #fff;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            font-family: 'Comic Sans MS', sans-serif;
            transition: opacity 0.2s;
        }
        /* Letreros grandes flotantes en el espacio (como NEBULOSA DE BESOS) */
        .texto-espacial {
            position: absolute;
            color: #ff7597;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #ff1493, 0 0 15px #ff1493;
            pointer-events: none;
            transform: translate(-50%, -50%);
            font-family: 'Impact', sans-serif;
        }
        #instrucciones {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            pointer-events: none;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="labels-container"></div>
    <div id="instrucciones">Explora nuestra galaxia infinita ✨</div>

    <script>
        const container = document.getElementById('canvas-container');
        const labelsContainer = document.getElementById('labels-container');
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020208, 0.01);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30); // Ángulo inclinado idéntico a la foto

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1; // Para que no se vaya completamente abajo

        // Luces
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const centerLight = new THREE.PointLight(0xffaa44, 2, 30);
        centerLight.position.set(0, 0, 0);
        scene.add(centerLight);

        // --- 1. AGUJERO NEGRO CENTRAL (INTERESTELAR) ---
        const blackHoleGroup = new THREE.Group();
        
        // Esfera negra central
        const singGeo = new THREE.SphereGeometry(2, 32, 32);
        const singMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const singularity = new THREE.Mesh(singGeo, singMat);
        blackHoleGroup.add(singularity);

        // Disco de acreción brillante dorado
        const diskGeo = new THREE.RingGeometry(2.2, 5, 64);
        const diskMat = new THREE.MeshBasicMaterial({ 
            color: 0xffaa33, 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.8
        });
        const disk = new THREE.Mesh(diskGeo, diskMat);
        disk.rotation.x = Math.PI / 2;
        blackHoleGroup.add(disk);
        scene.add(blackHoleGroup);

        // --- 2. GRAN CORAZÓN DE PARTÍCULAS ROSAS (ARRIBA) ---
        const heartParticlesGeo = new THREE.BufferGeometry();
        const heartCount = 2000;
        const heartPositions = new Float32Array(heartCount * 3);

        for (let i = 0; i < heartCount; i++) {
            // Ecuación matemática para generar la forma exacta de un corazón en 3D
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const z = (Math.random() - 0.5) * 3;

            // Escalar y posicionar arriba en el centro
            heartPositions[i * 3] = x * 0.4;
            heartPositions[i * 3 + 1] = (y * 0.4) + 12; // Flotando arriba
            heartPositions[i * 3 + 2] = z;
        }
        heartParticlesGeo.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
        const heartParticlesMat = new THREE.PointsMaterial({ 
            color: 0xff1493, 
            size: 0.25, 
            transparent: true, 
            opacity: 0.9 
        });
        const cosmicHeart = new THREE.Points(heartParticlesGeo, heartParticlesMat);
        scene.add(cosmicHeart);

        // --- 3. GALAXIA ESPIRAL DE PARTÍCULAS (EL SUELO ESPACIAL) ---
        const galaxyGeo = new THREE.BufferGeometry();
        const galaxyCount = 8000;
        const galaxyPositions = new Float32Array(galaxyCount * 3);
        const galaxyColors = new Float32Array(galaxyCount * 3);

        const colorCore = new THREE.Color('#ffaa44');
        const colorPart = new THREE.Color('#ff7597');

        for(let i=0; i<galaxyCount; i++) {
            const r = Math.random() * 25;
            const spin = 3.5;
            const angle = (i % 3) * ((2 * Math.PI) / 3) + r * spin; // 3 brazos espirales

            const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.5;
            const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.3;
            const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * 0.5;

            galaxyPositions[i*3] = Math.cos(angle) * r + randomX;
            galaxyPositions[i*3+1] = randomY; // Aplanado estilo disco
            galaxyPositions[i*3+2] = Math.sin(angle) * r + randomZ;

            // Degradado de color desde el centro hacia afuera
            const mixedColor = colorCore.clone().lerp(colorPart, r / 25);
            galaxyColors[i*3] = mixedColor.r;
            galaxyColors[i*3+1] = mixedColor.g;
            galaxyColors[i*3+2] = mixedColor.b;
        }
        galaxyGeo.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
        galaxyGeo.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));
        
        const galaxyMat = new THREE.PointsMaterial({
            size: 0.12,
            vertexColors: true,
            transparent: true,
            opacity: 0.7
        });
        const spiralGalaxy = new THREE.Points(galaxyGeo, galaxyMat);
        scene.add(spiralGalaxy);

        // --- 4. OSITOS EN BURBUJAS Y TEXTOS FLOTANTES ---
        const ositosDatos = [
            { nombre: "Tiernosito 🐻", color: 0xff94b8, frase: "Te amo con todo mi corazón, mi vida 💖", background: "rgba(255, 75, 130, 0.85)" },
            { nombre: "Divertosito ☀️", color: 0xffd700, frase: "¡Haces que cada día sea increíble! ☀️", background: "rgba(230, 184, 0, 0.85)" },
            { nombre: "Generosita 🎁", color: 0xba55d3, frase: "Eres mi regalo más bonito de la vida 🎁✨", background: "rgba(153, 50, 204, 0.85)" },
            { nombre: "Gruñosito 🌧️", color: 0x4682b4, frase: "Ni mil tormentas me alejarían de ti 💙", background: "rgba(28, 90, 138, 0.85)" },
            { nombre: "Suertosito 🍀", color: 0x32cd32, frase: "¡Qué suerte la mía de tenerte! 🍀💚", background: "rgba(34, 139, 34, 0.85)" },
            { nombre: "Amigosita 🍊", color: 0xffa500, frase: "Eres mi persona favorita en el mundo 🗺️", background: "rgba(255, 127, 0, 0.85)" },
            { nombre: "Armoniosita 🎵", color: 0x9370db, frase: "Tu risa es la melodía de mi vida 🎵💜", background: "rgba(123, 104, 238, 0.85)" },
            { nombre: "Deseosita ✨", color: 0x00ffff, frase: "Eres el deseo que pedí y se cumplió 💎", background: "rgba(0, 191, 255, 0.85)" }
        ];

        // Textos gigantes de fondo tipo "NEBULOSA DE BESOS"
        const textosExtra = [
            { texto: "NEBULOSA DE BESOS", radio: 8, angulo: 0 },
            { texto: "NUESTRO AMOR INFINITO ∞", radio: 14, angulo: Math.PI * 0.6 },
            { texto: "ERES MI UNIVERSO entero", radio: 18, angulo: Math.PI * 1.3 }
        ];

        const ositosMeshes = [];
        const labelElements = [];
        const extraTextElements = [];

        // Crear burbujas translúcidas para los ositos
        ositosDatos.forEach((datos, index) => {
            const bubbleGeo = new THREE.SphereGeometry(0.9, 32, 32);
            const bubbleMat = new THREE.MeshPhongMaterial({ 
                color: datos.color,
                transparent: true,
                opacity: 0.65,
                shininess: 100,
                specular: 0xffffff
            });
            const bubbleMesh = new THREE.Mesh(bubbleGeo, bubbleMat);
            scene.add(bubbleMesh);
            ositosMeshes.push(bubbleMesh);

            // Crear el letrero flotante
            const div = document.createElement('div');
            div.className = 'oso-label';
            div.style.backgroundColor = datos.background;
            div.innerHTML = `<strong>${datos.nombre}</strong><br>${datos.frase}`;
            labelsContainer.appendChild(div);
            labelElements.push(div);
        });

        // Crear textos espaciales extras
        textosExtra.forEach((t) => {
            const div = document.createElement('div');
            div.className = 'texto-espacial';
            div.innerText = t.texto;
            labelsContainer.appendChild(div);
            extraTextElements.push({ element: div, radio: t.radio, anguloInicial: t.angulo });
        });

        // --- 5. ANIMACIÓN Y ÓRBITAS ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Rotación suave de la galaxia y el corazón
            spiralGalaxy.rotation.y = elapsedTime * 0.05;
            cosmicHeart.rotation.y = -elapsedTime * 0.03;
            blackHoleGroup.rotation.y = elapsedTime * 0.2;

            // Mover las Burbujas de los ositos en órbita espiral plana
            ositosMeshes.forEach((bubble, index) => {
                const angle = (elapsedTime * 0.15) + (index * (Math.PI * 2 / ositosMeshes.length));
                const radius = 9 + Math.sin(index) * 2;

                bubble.position.x = Math.cos(angle) * radius;
                bubble.position.z = Math.sin(angle) * radius;
                bubble.position.y = Math.sin(elapsedTime * 2 + index) * 0.4; // Flote sutil horizontal

                // Proyectar etiquetas HTML en la pantalla 2D
                const tempV = new THREE.Vector3();
                bubble.getWorldPosition(tempV);
                tempV.project(camera);

                const xPixel = (tempV.x * .5 + .5) * window.innerWidth;
                const yPixel = (tempV.y * -.5 + .5) * window.innerHeight;

                const label = labelElements[index];
                label.style.left = `${xPixel}px`;
                label.style.top = `${yPixel}px`;

                // Ocultar si queda muy atrás del agujero negro
                if(bubble.position.z < -10) {
                    label.style.opacity = "0.2";
                } else {
                    label.style.opacity = "1";
                }
            });

            // Mover los textos grandes fijos de la galaxia
            extraTextElements.forEach((te) => {
                const currentAngle = te.anguloInicial + (elapsedTime * 0.05); // Se mueven a la velocidad de la galaxia
                const tempV = new THREE.Vector3(
                    Math.cos(currentAngle) * te.radio,
                    -0.5,
                    Math.sin(currentAngle) * te.radio
                );
                tempV.project(camera);

                const xPixel = (tempV.x * .5 + .5) * window.innerWidth;
                const yPixel = (tempV.y * -.5 + .5) * window.innerHeight;

                te.element.style.left = `${xPixel}px`;
                te.element.style.top = `${yPixel}px`;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
